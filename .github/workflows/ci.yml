name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_call:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ──────────────────────────────────────────────
  # Install & cache node_modules for downstream jobs
  # ──────────────────────────────────────────────
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # Some devDependencies require Node 20.19+; pin to avoid CI drift
          node-version: 20.19.0
          cache: npm
      - uses: actions/cache@v4
        id: nm-cache
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - if: steps.nm-cache.outputs.cache-hit != 'true'
        run: npm ci

  # ──────────────────────────────────────────────
  # Prettier — enforces consistent formatting
  # ──────────────────────────────────────────────
  format-check:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
      - uses: actions/cache@v4
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - run: npm run format:check

  # ──────────────────────────────────────────────
  # ESLint — catches code-quality issues
  # ──────────────────────────────────────────────
  lint:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
      - uses: actions/cache@v4
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - run: npm run lint

  # ──────────────────────────────────────────────
  # TypeScript — full project type-check
  # ──────────────────────────────────────────────
  typecheck:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
      - uses: actions/cache@v4
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - run: npm run typecheck

  # ──────────────────────────────────────────────
  # Vitest — unit & integration tests
  # ──────────────────────────────────────────────
  test:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
      - uses: actions/cache@v4
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - run: npm run test

  # ──────────────────────────────────────────────
  # Build — Next.js production build
  # ──────────────────────────────────────────────
  build:
    needs: [format-check, lint, typecheck, test]
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_CONVEX_URL: https://placeholder.convex.cloud
      NEXT_PUBLIC_CONVEX_SITE_URL: https://placeholder.convex.site
      CONVEX_SITE_URL: https://placeholder.convex.site
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
      - uses: actions/cache@v4
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - run: npm run build

  # ──────────────────────────────────────────────
  # Docs consistency — generated docs must be committed
  # ──────────────────────────────────────────────
  docs-consistency:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
      - uses: actions/cache@v4
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Regenerate docs
        run: npm run db:doc
      - name: Check for uncommitted doc changes
        run: |
          git diff --exit-code docs/ \
            || (echo "::error::Generated docs are out of date. Run 'npm run db:doc' locally and commit the result." && exit 1)

  # ──────────────────────────────────────────────
  # Security baseline — advisory audit
  # ──────────────────────────────────────────────
  security-baseline:
    needs: setup
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
      - uses: actions/cache@v4
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: npm audit (production only)
        run: npm audit --omit=dev --audit-level=high
